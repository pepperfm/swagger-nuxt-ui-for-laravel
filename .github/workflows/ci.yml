name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bun-version: [1.3.14]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Security audit
        run: bun run audit

      - name: PHP syntax
        run: bun run test:php

      - name: ESLint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Typecheck
        run: bun run typecheck

      - name: Build Nuxt demo
        run: bun run build

      - name: Build bridge viewer assets
        run: bun run build:bridge-assets

      - name: Verify viewer artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/viewer/viewer.js
          test -f dist/viewer/viewer.css
          test -f resources/assets/viewer.js
          test -f resources/assets/viewer.css
